version: '3.8'

services:
  lang-agent-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8488:8488"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8488/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s