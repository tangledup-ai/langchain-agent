services:
  lang-agent-api:
    build: .
    container_name: lang-agent-api
    ports:
      - "8488:8488"
    env_file:
      - ./.env
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    volumes:
      - ./configs:/app/configs
      - ./scripts:/app/scripts
      - ./assets:/app/assets
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8488/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s